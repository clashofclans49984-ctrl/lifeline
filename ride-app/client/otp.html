<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Verify your OTP to access Lifeline emergency services">
  <title>Lifeline — Verify OTP</title>
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    body { background: #ffffff; min-height: 100vh; }
    .otp-container {
      max-width: 520px;
      margin: 0 auto;
      padding: 40px 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .otp-header {
      text-align: center;
      margin-top: 48px;
      margin-bottom: 32px;
    }
    .otp-heading {
      font-size: 26px;
      font-weight: 700;
      margin-top: 12px;
      margin-bottom: 8px;
    }
    .otp-subtext {
      color: var(--muted);
      font-size: 15px;
    }
    .otp-phone {
      font-size: 20px;
      font-weight: 700;
      color: var(--blue);
      margin-top: 4px;
    }
    .otp-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: var(--shadow);
    }
    .otp-boxes {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .otp-box {
      width: 52px;
      height: 56px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #f8fafc;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: all 0.2s;
      color: var(--text);
    }
    .otp-box:focus {
      border-color: var(--blue);
      background: white;
      box-shadow: 0 0 0 3px rgba(26,79,160,0.1);
    }
    .resend-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
    }
    .timer {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .resend-sep {
      color: var(--border);
    }
    .resend-btn {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      cursor: not-allowed;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.2s;
    }
    .resend-btn.active {
      color: var(--blue);
      cursor: pointer;
    }
    .resend-btn.active:hover {
      text-decoration: underline;
    }
    .terms {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 20px;
      line-height: 1.6;
    }
    .terms a { color: var(--blue); text-decoration: underline; }
    .dev-otp-hint {
      background: var(--blue-light);
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 10px 16px;
      text-align: center;
      font-size: 13px;
      color: var(--blue);
      font-weight: 600;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="otp-container">
    <a href="/" class="lifeline-logo fade-up">
      <span class="logo-icon">🚑</span>
      Life<span class="logo-green">line</span>
    </a>

    <div class="otp-header">
      <div class="label-red fade-up-1">EMERGENCY</div>
      <h1 class="otp-heading fade-up-2">Verify OTP</h1>
      <p class="otp-subtext fade-up-3">Enter the OTP sent to</p>
      <p class="otp-phone fade-up-3" id="display-phone">+91 XXXXX XXXXX</p>
    </div>

    <div class="otp-card fade-up-4">
      <div id="dev-hint" class="dev-otp-hint" style="display:none;"></div>

      <div class="otp-boxes" id="otp-boxes">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
      </div>

      <button class="btn btn-blue btn-full" id="verify-btn" type="button">Verify</button>

      <div class="resend-row">
        <span class="timer" id="timer">01:00</span>
        <span class="resend-sep">|</span>
        <button class="resend-btn" id="resend-btn" type="button">Resend OTP</button>
      </div>

      <p class="terms">
        By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </p>
    </div>
  </div>

  <script src="/shared/toast.js"></script>
  <script>
    const phone = sessionStorage.getItem('phone');
    if (!phone) {
      window.location.href = '/signup.html';
    }

    // Display formatted phone
    const displayPhone = document.getElementById('display-phone');
    if (phone) {
      displayPhone.textContent = '+91 ' + phone.slice(0,5) + ' ' + phone.slice(5);
    }

    // Show dev OTP hint if available
    const devOtp = sessionStorage.getItem('devOtp');
    if (devOtp) {
      const hint = document.getElementById('dev-hint');
      hint.style.display = 'block';
      hint.textContent = '🧪 Dev Mode OTP: ' + devOtp;
    }

    // OTP Box logic
    const boxes = document.querySelectorAll('.otp-box');

    boxes.forEach((box, idx) => {
      box.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val.slice(0, 1);
        if (val && idx < boxes.length - 1) {
          boxes[idx + 1].focus();
        }
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !box.value && idx > 0) {
          boxes[idx - 1].focus();
        }
      });
    });

    // Paste handling
    boxes[0].addEventListener('paste', (e) => {
      const digits = e.clipboardData.getData('text').replace(/\D/g, '');
      boxes.forEach((b, i) => { if (digits[i]) b.value = digits[i]; });
      boxes[Math.min(digits.length, boxes.length - 1)].focus();
      e.preventDefault();
    });

    // Timer
    let timeLeft = 60;
    const timerEl = document.getElementById('timer');
    const resendBtn = document.getElementById('resend-btn');

    const timerInterval = setInterval(() => {
      timeLeft--;
      const mins = String(Math.floor(timeLeft / 60)).padStart(2, '0');
      const secs = String(timeLeft % 60).padStart(2, '0');
      timerEl.textContent = mins + ':' + secs;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        resendBtn.classList.add('active');
      }
    }, 1000);

    // Resend
    resendBtn.addEventListener('click', async () => {
      if (!resendBtn.classList.contains('active')) return;

      try {
        const res = await fetch('/api/auth/phone/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        const data = await res.json();
        if (data.otpForDev) {
          sessionStorage.setItem('devOtp', data.otpForDev);
          const hint = document.getElementById('dev-hint');
          hint.style.display = 'block';
          hint.textContent = '🧪 Dev Mode OTP: ' + data.otpForDev;
        }
        showToast('✅ OTP resent!');
        timeLeft = 60;
        resendBtn.classList.remove('active');
        const newInterval = setInterval(() => {
          timeLeft--;
          const mins = String(Math.floor(timeLeft / 60)).padStart(2, '0');
          const secs = String(timeLeft % 60).padStart(2, '0');
          timerEl.textContent = mins + ':' + secs;
          if (timeLeft <= 0) {
            clearInterval(newInterval);
            resendBtn.classList.add('active');
          }
        }, 1000);
      } catch (err) {
        showToast('❌ Failed to resend OTP');
      }
    });

    // Verify
    document.getElementById('verify-btn').addEventListener('click', async () => {
      const otp = Array.from(boxes).map(b => b.value).join('');
      if (otp.length !== 7) {
        showToast('⚠️ Please enter all 7 digits');
        return;
      }

      const btn = document.getElementById('verify-btn');
      btn.disabled = true;
      btn.textContent = 'Verifying...';

      try {
        const res = await fetch('/api/auth/phone/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, otp })
        });
        const data = await res.json();

        if (!res.ok) {
          showToast('❌ ' + (data.error || 'Verification failed'));
          btn.disabled = false;
          btn.textContent = 'Verify';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('userId', data.user.id);
        localStorage.setItem('userName', data.user.name || 'Patient');
        localStorage.setItem('userRole', 'patient');
        sessionStorage.removeItem('phone');
        sessionStorage.removeItem('devOtp');
        showToast('✅ Verified successfully!');
        window.location.href = '/dashboard.html';
      } catch (err) {
        showToast('❌ Network error');
        btn.disabled = false;
        btn.textContent = 'Verify';
      }
    });

    // Auto-focus first box
    boxes[0].focus();
  </script>
</body>
</html>
