<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lifeline — Emergency ambulance dispatch. 10-minute ambulance service when seconds count.">
  <title>Lifeline — Emergency Ambulance Service</title>
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    body { background: var(--bg); overflow-x: hidden; }
    body.dark-theme {
      --bg: #0f172a;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --white: #1e293b;
      --border: #334155;
    }
    body.dark-theme .navbar {
      background: rgba(15,23,42,0.92);
      border-bottom-color: #334155;
    }
    body.dark-theme .navbar-links a { color: #94a3b8; }
    body.dark-theme .navbar-links a:hover { color: #f1f5f9; }
    body.dark-theme .hero-heading { color: #f1f5f9; }
    body.dark-theme .hero-sub { color: #94a3b8; }
    body.dark-theme .footer { background: #0b1120; border-top-color: #334155; }
    body.dark-theme .footer-contact { color: #94a3b8; }
    body.dark-theme .theme-toggle {
      background: rgba(255,255,255,0.08);
      color: #f1f5f9;
      border-color: #475569;
    }

    /* Hero Section */
    .hero {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 48px 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      min-height: calc(100vh - 64px - 80px);
    }
    .hero-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .hero-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 52px;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .hero-sub {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .hero-btns {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .hero-btns .btn {
      padding: 18px 32px;
      font-size: 17px;
      font-weight: 700;
      min-width: 220px;
      border-radius: 12px;
    }

    /* Right Column — Ambulance Visual */
    .hero-visual {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-visual-inner {
      width: 100%;
      max-width: 460px;
      aspect-ratio: 1;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(26,79,160,.08), rgba(22,163,74,.08));
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .hero-ambulance {
      font-size: 160px;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.08));
      animation: float-ambulance 4s ease-in-out infinite;
    }
    @keyframes float-ambulance {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }
    .hero-badge {
      position: absolute;
      top: 24px;
      right: 24px;
      background: white;
      padding: 12px 20px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      font-size: 14px;
      font-weight: 600;
      color: var(--green);
      animation: fadeUp 0.6s ease 0.5s both;
    }

    /* Theme Toggle */
    .theme-toggle {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .theme-toggle:hover {
      transform: scale(1.1);
    }

    /* Footer */
    .footer {
      border-top: 1px solid var(--border);
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      background: white;
    }
    .footer-contact {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 14px;
      color: var(--muted);
    }
    .footer-apps {
      display: flex;
      gap: 12px;
    }
    .app-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #0f172a;
      color: white;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }
    .app-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        padding: 40px 24px;
        text-align: center;
      }
      .hero-heading { font-size: 36px; }
      .hero-btns { justify-content: center; }
      .hero-visual { order: -1; }
      .hero-visual-inner { max-width: 300px; }
      .hero-ambulance { font-size: 100px; }
      .footer { padding: 20px 24px; justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar fade-up">
    <a href="/" class="lifeline-logo">
      <span class="logo-icon">🚑</span>
      Life<span class="logo-green">line</span>
    </a>
    <ul class="navbar-links">
      <li><a href="#how">How it works</a></li>
      <li><a href="#about">About us</a></li>
      <li><a href="/contacts.html">Contact</a></li>
    </ul>
    <div class="navbar-actions">
      <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-left">
      <div class="hero-label fade-up-1">EMERGENCY</div>
      <h1 class="hero-heading fade-up-2">10-Minute<br>Ambulance Service.</h1>
      <p class="hero-sub fade-up-3">Emergency medical response when seconds count.</p>
      <div class="hero-btns fade-up-4">
        <a href="/signup.html" class="btn btn-blue" id="login-user-btn">🧑 LOGIN AS USER</a>
        <a href="/driver/login.html" class="btn btn-green" id="login-driver-btn">🚑 LOGIN AS DRIVER</a>
      </div>
    </div>
    <div class="hero-visual fade-up-3">
      <div class="hero-visual-inner">
        <div class="hero-ambulance">🚑</div>
        <div class="hero-badge">⚡ Avg response: 8 min</div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-contact">
      <span>📞 Contact Info</span>
      <span>📱 +91 130-563-780</span>
      <span>🌐 lifeline.app</span>
    </div>
    <div class="footer-apps">
      <a href="#" class="app-btn">▶ Google Play</a>
      <a href="#" class="app-btn"> App Store</a>
    </div>
  </footer>

  <script src="/shared/toast.js"></script>
  <script>
    // Dark theme toggle
    const themeToggle = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('lifeline-theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-theme');
      themeToggle.textContent = '☀️';
    }
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-theme');
      const isDark = document.body.classList.contains('dark-theme');
      themeToggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('lifeline-theme', isDark ? 'dark' : 'light');
    });

    // Check if already logged in
    const token = localStorage.getItem('token');
    const userRole = localStorage.getItem('userRole');
    if (token && userRole === 'patient') {
      document.getElementById('login-user-btn').href = '/dashboard.html';
      document.getElementById('login-user-btn').textContent = '🧑 GO TO DASHBOARD';
    }
    if (token && userRole === 'driver') {
      document.getElementById('login-driver-btn').href = '/driver/dashboard.html';
      document.getElementById('login-driver-btn').textContent = '🚑 GO TO DASHBOARD';
    }
  </script>
</body>
</html>
