<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign up for Lifeline emergency ambulance services">
  <title>Lifeline — Sign Up</title>
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    body { background: #ffffff; min-height: 100vh; }
    .signup-container {
      max-width: 520px;
      margin: 0 auto;
      padding: 40px 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .signup-header {
      text-align: center;
      margin-top: 48px;
      margin-bottom: 32px;
    }
    .signup-heading {
      font-size: 26px;
      font-weight: 700;
      margin-top: 12px;
    }
    .signup-heading .blue { color: var(--blue); }
    .signup-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: var(--shadow);
    }
    .field-label {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
      display: block;
    }
    .phone-row {
      display: flex;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .phone-prefix {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      background: #f8fafc;
      border-right: 1px solid var(--border);
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      height: 52px;
    }
    .phone-input {
      border: none;
      flex: 1;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      padding: 0 14px;
      height: 52px;
      outline: none;
      background: white;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-text {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
    .google-btn {
      width: 100%;
      height: 52px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      transition: all 0.2s;
    }
    .google-btn:hover {
      border-color: var(--blue);
      background: #fafbff;
    }
    .google-g {
      width: 20px; height: 20px;
    }
    .terms {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 20px;
      line-height: 1.6;
    }
    .terms a {
      color: var(--blue);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <!-- Logo -->
    <a href="/" class="lifeline-logo fade-up">
      <span class="logo-icon">🚑</span>
      Life<span class="logo-green">line</span>
    </a>

    <!-- Header -->
    <div class="signup-header">
      <div class="label-red fade-up-1">EMERGENCY</div>
      <h1 class="signup-heading fade-up-2">
        <span class="blue">Sign Up</span> to Access<br>Emergency Services
      </h1>
    </div>

    <!-- Card -->
    <div class="signup-card fade-up-3">
      <label class="field-label">Phone Number</label>
      <div class="phone-row">
        <div class="phone-prefix">🇮🇳 +91</div>
        <input type="tel" class="phone-input" id="phone-input" placeholder="Enter mobile number" maxlength="10" autocomplete="tel">
      </div>

      <button class="btn btn-blue btn-full" id="continue-btn" type="button">Continue</button>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">OR</span>
        <div class="divider-line"></div>
      </div>

      <button class="google-btn" id="google-btn" type="button">
        <svg class="google-g" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A10.997 10.997 0 0012 23z" fill="#34A853"/>
          <path d="M5.84 14.09A6.606 6.606 0 015.5 12c0-.72.12-1.42.34-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign Up with Google
      </button>

      <p class="terms">
        By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </p>
    </div>
  </div>

  <script src="/shared/toast.js"></script>
  <script type="module">
    import { auth, googleProvider } from '/shared/firebase-config.js';
    import { signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const phoneInput = document.getElementById('phone-input');
    const continueBtn = document.getElementById('continue-btn');
    const googleBtn = document.getElementById('google-btn');

    // Phone sign up
    continueBtn.addEventListener('click', async () => {
      const phone = phoneInput.value.replace(/\D/g, '');
      if (phone.length !== 10) {
        showToast('⚠️ Please enter a valid 10-digit mobile number');
        return;
      }

      continueBtn.disabled = true;
      continueBtn.textContent = 'Sending OTP...';

      try {
        const res = await fetch('/api/auth/phone/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: phone })
        });
        const data = await res.json();

        if (!res.ok) {
          showToast('❌ ' + (data.error || 'Failed to send OTP'));
          continueBtn.disabled = false;
          continueBtn.textContent = 'Continue';
          return;
        }

        sessionStorage.setItem('phone', phone);
        if (data.otpForDev) {
          sessionStorage.setItem('devOtp', data.otpForDev);
        }
        showToast('✅ OTP sent successfully!');
        window.location.href = '/otp.html';
      } catch (err) {
        showToast('❌ Network error. Please try again.');
        continueBtn.disabled = false;
        continueBtn.textContent = 'Continue';
      }
    });

    // Enter key
    phoneInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') continueBtn.click();
    });

    // Google sign up
    googleBtn.addEventListener('click', async () => {
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const idToken = await result.user.getIdToken();

        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken })
        });
        const data = await res.json();

        if (!res.ok) {
          showToast('❌ ' + (data.error || 'Google auth failed'));
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('userId', data.user.id);
        localStorage.setItem('userName', data.user.name);
        localStorage.setItem('userRole', 'patient');
        showToast('✅ Welcome, ' + data.user.name + '!');
        window.location.href = '/dashboard.html';
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          showToast('❌ Google sign-in failed. Check Firebase config.');
          console.error(err);
        }
      }
    });
  </script>
</body>
</html>
