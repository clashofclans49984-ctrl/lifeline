<!DOCTYPE html>

        }

            color: #a0a0a0;
            margin-bottom: 40px;
        }
        .container {

        }
        .prompt-card {
            background-color: #16213e;
            border-left: 5px solid #4ecca3;

            padding: 25px;
            margin-bottom: 30px;

        }

            color: #1a1a2e;
            font-weight: bold;

            height: 35px;

            justify-content: center;
            border-radius: 50%;

            margin: 0;
            font-size: 1.4rem;
            color: #ffffff;
        }

            color: #1a1a2e;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            float: right;

        }

            content: "";
            clear: both;

        }
    </style>
</head>
<body>
    <!-- 
    ========================================================
    LIFELINE WEB APP RECONSTRUCTION: 15 SEQUENTIAL PROMPTS
    ========================================================
    
    Prompt 1: Initialize Git & Project Structure
    We are building an Uber/Ola-style ambulance ride-booking web application called 'Lifeline'. The tech stack is a Node.js/Express backend, and a pure HTML/CSS/JS frontend (no React). Please create the root project folder named 'Lifeline Website'. Inside it, create a 'ride-app' directory containing two subdirectories: 'client' and 'server'. Initialize a git repository in the root directory. Create a comprehensive .gitignore file in the root to ignore node_modules and .env files. Finally, create a basic README.md explaining the project structure. Once done, run 'git add .' and 'git commit -m "Part 1: Initialize Git and basic project folders"' to log this step.

    Prompt 2: Server Setup & Dependencies
    Navigate to the 'ride-app/server' directory and initialize a new Node.js project. We need to install the following dependencies: express, socket.io, mongoose, firebase-admin, jsonwebtoken, bcryptjs, cors, dotenv, and node-fetch. Also install nodemon as a dev dependency. Update the package.json to include 'start' and 'dev' scripts pointing to 'index.js'. Once done, run 'git add .' and 'git commit -m "Part 2: Initialize Node.js server and install dependencies"'.

    Prompt 3: Basic Express Server (index.js)
    In the 'ride-app/server' directory, create a basic 'index.js' file. Set up an Express application, require dotenv, configure CORS, and set up basic JSON parsing middleware. Load environment variables. Start the HTTP server on a port (e.g., process.env.PORT or 5000) and add a simple root GET route '/' that returns { message: 'Lifeline API is running' }. Once done, run 'git add .' and 'git commit -m "Part 3: Create base Express server config"'.

    Prompt 4: Database Models Setup
    Inside 'ride-app/server', create a 'models' directory. Create Mongoose schemas for the application entities: User, Driver, Ride/Booking, Hospital, and Contact. They should securely store passwords (if not using Firebase entirely) and hold location data in GeoJSON or simple lat/lng format. Include necessary fields like names, phone numbers, and statuses. Once done, run 'git add .' and 'git commit -m "Part 4: Create Mongoose data models for User, Driver, Ride, Hospital, Contact"'.

    Prompt 5: Authentication Middleware & Configuration
    Inside 'ride-app/server', create a 'middleware' directory. Create an 'authMiddleware.js' file to verify JSON Web Tokens (JWT) for protected routes. Also, if there's any file needed for Firebase Admin initialization (for OTP generation/verification), set it up here or in a config file. Ensure error handling for unauthenticated requests. Once done, run 'git add .' and 'git commit -m "Part 5: Implement Authentication JWT and Firebase middleware"'.

    Prompt 6: Authentication API Routes (Auth)
    Inside 'ride-app/server', create a 'routes' directory. Implement authentication routes (e.g., 'authRoutes.js') that handle Signup, Login, and OTP generation/verification for both Users and Drivers. Connect these routes with the previously created Mongoose models to register and authenticate users. Import and mount these routes in 'index.js'. Once done, run 'git add .' and 'git commit -m "Part 6: Implement Auth API endpoints for users and drivers"'.

    Prompt 7: Main Application API Routes
    In the 'server/routes' directory, create endpoints for the core functionality: a 'rideRoutes.js' for users to request ambulances and drivers to accept/complete them, a 'hospitalRoutes.js' to fetch nearby hospitals, and a 'contactRoutes.js' to manage emergency contacts. Connect these to 'index.js' and protect them using 'authMiddleware.js'. Once done, run 'git add .' and 'git commit -m "Part 7: Implement API endpoints for rides, hospitals, and contacts"'.

    Prompt 8: Real-time Socket.IO Setup
    Inside 'ride-app/server', create a 'sockets' directory. Inside 'sockets/index.js', configure Socket.IO using the existing HTTP server created in 'server/index.js'. Set up socket events to handle real-time location tracking: driver location updates, passenger ride requests, driver acceptance, and live trip tracking. Connect the sockets module to 'index.js'. Once done, run 'git add .' and 'git commit -m "Part 8: Integrate Socket.IO for real-time location mapping and ride updates"'.

    Prompt 9: Client Foundation & Authentication Pages
    Now focus on the 'ride-app/client' directory. We will use plain HTML/CSS/JS. Create a 'shared' directory for shared styles, assets, and utility JS functions. Create the 'index.html' (Landing Page), 'signup.html' (Registration UI), and 'otp.html' (OTP Verification UI). Link them to basic CSS. Ensure they have the necessary forms and IDs for frontend JS logic. Once done, run 'git add .' and 'git commit -m "Part 9: Build static HTML/CSS foundation for landing, signup, and OTP pages"'.

    Prompt 10: Frontend Authentication Logic
    In the 'ride-app/client' directory, write the JavaScript to handle the forms in 'signup.html', 'index.html' (for login), and 'otp.html'. Implement fetch API calls pointing to the backend Auth routes. On successful login/OTP verification, save the JWT token to 'localStorage' and redirect the user to 'dashboard.html'. Once done, run 'git add .' and 'git commit -m "Part 10: Implement frontend JS for authentication and token management"'.

    Prompt 11: User Dashboard and Emergency Features
    In 'ride-app/client', create 'dashboard.html'. This page should contain buttons for 'Call Ambulance', 'Locate Nearby Hospitals', etc. Write the accompanying JS to fetch user data from the protected API endpoints (sending JWT in headers). Create UI components inside the 'user' folder for the main interface. Once done, run 'git add .' and 'git commit -m "Part 11: Build User Dashboard UI and connect to backend API"'.

    Prompt 12: Hospitals and Contacts Implementation
    In 'ride-app/client', create 'hospitals.html' and 'contacts.html'. Implement functionality to display a list of emergency contacts and nearby hospitals by making GET requests to our Node.js server. Present this data in a clean, modern UI grid or list. Add functionality to add new emergency contacts if required. Once done, run 'git add .' and 'git commit -m "Part 12: Implement UI and logic for Hospitals and Contacts features"'.

    Prompt 13: Driver Interface
    In 'ride-app/client', create a 'driver' directory containing a 'driver-dashboard.html' (or equivalent driver UI). This interface must listen for incoming ride/ambulance requests via Socket.IO, allow the driver to accept/reject rides, and continuously push the driver's GPS location via Web Geolocation API over websocket. Connect this UI to the driver API routes. Once done, run 'git add .' and 'git commit -m "Part 13: Build Driver UI with Socket.IO location broadcasting and ride acceptance"'.

    Prompt 14: Real-time Patient Tracking Interface
    In 'ride-app/client', create 'track.html'. In this page, integrate a map (e.g., Leaflet.js with OSM tiles). Connect as a user to Socket.IO to listen for the driver's location updates. Render a marker on the map that moves in real-time as the driver approaches. Display ETA and ride status updates. Once done, run 'git add .' and 'git commit -m "Part 14: Implement real-time map tracking UI using Socket.IO and Leaflet"'.

    Prompt 15: Final Review, Testing & Bug Fixes
    Review the entire codebase. Create a 'test' directory inside 'client' or 'server' with some basic API testing scripts or Postman collections. Provide a '.env.example' in the server directory with placeholder keys. Apply final CSS polish to ensure the app is fully responsive and looks like a premium Uber-style product. Fix any remaining CORS or connection issues between client and server. Once done, run 'git add .' and 'git commit -m "Part 15: Final polish, bug fixes, and project finalization"'.
    -->

                    button.innerText = "Copied!";
